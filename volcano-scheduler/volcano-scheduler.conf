# Volcano scheduler configuration for COUBES benchmarking.
#
# Volcano uses its own config format (not KubeSchedulerConfiguration).
# Actions run in order each scheduling cycle:
#   enqueue  — moves PodGroups from Pending to Inqueue when resources are available
#   allocate — assigns pods to nodes (the main scheduling action)
#   backfill — schedules best-effort (zero-resource) pods into idle capacity
#
# Tiers define which plugins run. Plugins in tier 1 are checked first; if they
# reject a job, tier 2 plugins are not consulted. This mirrors kube-scheduler's
# filter/score pipeline.
#
# For COUBES we use:
#   - priority:   respects pod PriorityClass (needed for correct ordering)
#   - proportion:  allocates cluster resources proportionally to queue weights
#   - predicates:  runs the same node filters as kube-scheduler (resource fit, taints, etc.)
#   - nodeorder:   scores nodes — configured below for bin-packing (mostrequested)
#
# The proportion plugin enables multi-queue resource management. Queues with
# higher weights get a larger share of cluster resources. For example, a queue
# with weight 3 gets 3x the resources of a queue with weight 1.
#
# To switch to spreading (LeastAllocated equivalent), change mostrequested.weight to 0
# and leastrequested.weight to 1.

actions: "enqueue, allocate, backfill"
tiers:
- plugins:
  - name: priority
  - name: proportion
- plugins:
  - name: predicates
  - name: nodeorder
    arguments:
      mostrequested.weight: 1
      leastrequested.weight: 0
      balancedresource.weight: 0
      nodeaffinity.weight: 0
      podaffinity.weight: 0
      tainttoleration.weight: 0
      imagelocality.weight: 0
